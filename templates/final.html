<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强版 - 电力系统故障诊断智能体</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: none;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }

        .upload-hint {
            font-size: 14px;
            color: #999;
            margin-top: 10px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .sample-selector {
            margin: 15px 0;
        }

        .sample-selector label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .sample-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-small {
            width: auto;
            padding: 12px 24px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .result-section {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .result-label {
            font-weight: 500;
            color: #666;
        }

        .result-value {
            font-weight: bold;
            color: #333;
        }

        .result-value.fault {
            color: #e74c3c;
        }

        .result-value.normal {
            color: #27ae60;
        }

        .prob-list {
            margin-top: 15px;
        }

        .prob-item {
            margin-bottom: 12px;
        }

        .prob-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .prob-bar-container {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .prob-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s;
        }

        .prob-bar.max {
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .report-box {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .report-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .report-line {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }

        .chat-area {
            margin-top: 20px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 15px 0;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        .chat-input input:focus {
            border-color: #667eea;
            outline: none;
        }

        .chat-messages {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            max-width: 85%;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.agent {
            background: #f1f1f1;
            color: #333;
            margin-right: auto;
            white-space: pre-line;
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px 0;
        }

        .quick-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
        }

        .anomaly-warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ 电力系统故障诊断智能体</h1>
            <div class="badges">
                <span class="badge">✓ 单样本诊断</span>
                <span class="badge">✓ 批量数据分析</span>
                <span class="badge">✓ 异常检测</span>
                <span class="badge">✓ 智能问答</span>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('diagnose')">单样本诊断</button>
                <button class="tab" onclick="switchTab('batch')">批量分析</button>
                <button class="tab" onclick="switchTab('chat')">智能问答</button>
            </div>

            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击上传 CSV 数据文件</div>
                <div class="upload-hint">支持 DEMO_PERFECT.csv 或其他格式一致的数据集</div>
            </div>
            <input type="file" id="fileInput" accept=".csv" onchange="handleFileUpload(event)">

            <div class="file-info" id="fileInfo">
                <div style="font-weight: bold; color: #27ae60;">✓ 文件上传成功！</div>
                <div id="sampleCount" style="margin-top: 8px; color: #666;"></div>
            </div>

            <div id="tab-diagnose" class="tab-content active">
                <div class="sample-selector">
                    <label>选择待诊断样本:</label>
                    <select id="sampleSelect" disabled>
                        <option value="">请先上传文件</option>
                    </select>
                </div>
                <button class="btn" id="diagnoseBtn" disabled onclick="diagnoseSample()">开始诊断</button>
            </div>

            <div id="tab-batch" class="tab-content">
                <div style="color: #666; margin: 15px 0;">上传文件后，一键分析所有样本的故障分布、电压统计、异常检测</div>
                <button class="btn btn-green" id="batchBtn" disabled onclick="batchAnalyze()">📊 一键批量分析</button>
                <div id="batchResult"></div>
            </div>

            <div id="tab-chat" class="tab-content">
                <div style="color: #666; margin: 15px 0;">先批量分析完成后，可以向智能体提问</div>
                
                <div class="quick-questions">
                    <button class="quick-btn" onclick="askQuick('给我一个总结报告')">📊 总结报告</button>
                    <button class="quick-btn" onclick="askQuick('故障有多少个？占比多少？')">🔴 故障统计</button>
                    <button class="quick-btn" onclick="askQuick('故障最多的节点是哪个？')">📍 故障节点</button>
                    <button class="quick-btn" onclick="askQuick('哪种故障最严重？')">⚠️ 故障危害</button>
                    <button class="quick-btn" onclick="askQuick('有什么异常情况吗？')">❓ 异常检测</button>
                    <button class="quick-btn" onclick="askQuick('各种故障有什么区别？')">💡 知识科普</button>
                </div>

                <div class="chat-input">
                    <input type="text" id="questionInput" placeholder="输入你的问题..." disabled>
                    <button class="btn btn-small" id="askBtn" disabled onclick="askQuestion()">发送</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
            </div>

            <div class="loading" id="loading">
                <div>🔄 处理中...</div>
            </div>

            <div class="result-section" id="result">
                <div class="result-title">诊断结果</div>
                <div class="result-item">
                    <span class="result-label">故障类型:</span>
                    <span class="result-value" id="faultType"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">诊断置信度:</span>
                    <span class="result-value" id="confidence"></span>
                </div>
                <div class="result-item" id="faultLocationRow" style="display: none;">
                    <span class="result-label">故障位置:</span>
                    <span class="result-value" id="faultLocation"></span>
                </div>
                <div class="prob-list" id="probList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentFeatures = null;
        let batchResult = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loading').classList.add('active');

            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/v2/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        currentFeatures = data.features;
                        
                        document.getElementById('sampleCount').textContent = `共 ${data.total_samples} 个样本`;
                        document.getElementById('fileInfo').classList.add('active');
                        
                        const select = document.getElementById('sampleSelect');
                        select.innerHTML = '';
                        data.samples.forEach((s, i) => {
                            select.innerHTML += `<option value="${i}">样本 ${i+1}: ${s.true_fault_type}</option>`;
                        });
                        select.disabled = false;
                        
                        document.getElementById('diagnoseBtn').disabled = false;
                        document.getElementById('batchBtn').disabled = false;
                    }
                    alert('文件上传成功！');
                })
                .catch(err => alert('上传失败: ' + err))
                .finally(() => {
                    document.getElementById('loading').classList.remove('active');
                });
        }

        function diagnoseSample() {
            const idx = document.getElementById('sampleSelect').value;
            document.getElementById('loading').classList.add('active');
            fetch('/api/v2/diagnose', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    features: currentFeatures, sample_index: parseInt(idx)
                })
            })
            .then(r => r.json())
            .then(data => { displayResult(data.result); })
            .catch(err => alert('错误: ' + err))
            .finally(() => {
                document.getElementById('loading').classList.remove('active');
            });
        }

        function batchAnalyze() {
            document.getElementById('loading').classList.add('active');
            fetch('/api/v2/batch_analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({features: currentFeatures})
            })
            .then(r => r.json())
            .then(data => {
                batchResult = data.result;
                let html = '<div class="report-box"><div class="report-title">📊 数据分析报告</div>';
                data.result.report_lines.forEach(line => {
                    html += `<div class="report-line">${line}</div>`;
                });
                html += '</div>';

                if (data.result.anomalies.length > 0) {
                    html += '<div class="anomaly-warning">⚠️ 发现 ' + data.result.anomalies.length + ' 个异常样本</div>';
                }

                document.getElementById('batchResult').innerHTML = html;
                document.getElementById('questionInput').disabled = false;
                document.getElementById('askBtn').disabled = false;
            })
            .catch(err => alert('错误: ' + err))
            .finally(() => {
                document.getElementById('loading').classList.remove('active');
            });
        }

        function askQuick(q) {
            document.getElementById('questionInput').value = q;
            askQuestion();
        }

        function askQuestion() {
            const q = document.getElementById('questionInput').value.trim();
            if (!q) return;
            document.getElementById('chatMessages').innerHTML += 
                `<div class="message user">${q}</div>`;
            document.getElementById('questionInput').value = '';

            fetch('/api/v2/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q, batch_result: batchResult})
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('chatMessages').innerHTML += 
                    `<div class="message agent">${data.answer.answer}</div>`;
            });
        }

        function displayResult(result) {
            document.getElementById('faultType').textContent = '【' + result.fault_type + '】 ' + result.fault_type_name;
            document.getElementById('faultType').className = 'result-value ' + (result.has_fault ? 'fault' : 'normal');
            document.getElementById('confidence').textContent = (result.fault_confidence * 100).toFixed(1) + '%';

            if (result.has_fault) {
                document.getElementById('faultLocationRow').style.display = 'flex';
                document.getElementById('faultLocation').textContent = 
                    `节点 ${result.fault_bus} (置信度: ${(result.localization_confidence * 100).toFixed(1)}%)`;
            }

            const types = ['Normal', '3LG', 'LG', 'LLG', 'LL'];
            const names = ['正常', '三相短路', '单相接地', '两相接地', '两相短路'];
            let html = '';
            const maxType = result.fault_type;
            types.forEach((type, i) => {
                const prob = result.class_probabilities[type] || 0;
                const isMax = type === maxType;
                html += `
                <div class="prob-item">
                    <div class="prob-label">
                        <span>${type} (${names[i]})</span>
                        <span style="font-weight: bold; ${isMax ? 'color: #667eea' : ''}">${(prob*100).toFixed(1)}%</span>
                    </div>
                    <div class="prob-bar-container">
                        <div class="prob-bar ${isMax ? 'max' : ''}" style="width: ${prob*100}%"></div>
                    </div>
                </div>`;
            });

            document.getElementById('probList').innerHTML = html;
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
